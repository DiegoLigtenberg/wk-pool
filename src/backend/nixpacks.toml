# poetry.lock would select Poetry 1.3 (incompatible). Skip the early pyproject-only
# install layer (it fails without README.md and app/). After the full COPY, create
# the venv and install the package (skip does not create /opt/venv by itself).
[variables]
NIXPACKS_PYTHON_VERSION = "3.12"
NIXPACKS_PYTHON_PACKAGE_MANAGER = "skip"

[phases.build]
cmds = [
  "python -m venv --copies /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip build setuptools",
  "/opt/venv/bin/pip install --no-cache-dir .",
]
