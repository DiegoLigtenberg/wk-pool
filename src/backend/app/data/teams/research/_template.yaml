# =============================================================================
# TOURNAMENT CONTEXT ,  generiek voor groep + knock-out (schema_version: 1)
# =============================================================================
tournament_context:
  schema_version: 1

  phases:
    # --- GROEPSFASE ---
    group:
      # upcoming | in_progress | completed | eliminated
      status: upcoming

      # Geplande wedstrijden ,  OVERSCHREVEN door sync_research_yaml (CSV)
      fixture_plan:
        group: A
        opponents_nl: [Mexico, Zuid-Afrika]
        opponents_fifa: [Mexico, South Africa]
        fixtures: []
        fixture_hooks: []
        schedule_rest_notes: null
        venue_dispersion_notes: ""

      # Gespeelde wedstrijden ,  HANDMATIG tijdens tornooi (sync raakt dit niet aan)
      played_matches: []
      # - match_number: 1
      #   opponent_fifa: South Africa
      #   opponent_nl: Zuid-Afrika
      #   result: W          # W | D | L
      #   score_for: 2
      #   score_against: 0
      #   stage_round: group
      #   notes: "Sterke tweede helft na rust"

      # Stand na laatste gespeelde groepswedstrijd (snapshot)
      standings:
        points: 0
        played: 0
        wins: 0
        draws: 0
        losses: 0
        goals_for: 0
        goals_against: 0
        position: null

      # Momentum ,  HANDMATIG (sync raakt dit niet aan)
      momentum:
        label: null          # rising | stable | falling | null
        notes: null

      phase_notes: null

    # --- KNOCK-OUT (later invullen wanneer bracket vaststaat) ---
    knockout:
      status: not_applicable   # not_applicable | upcoming | active | eliminated
      fixture_plan: null       # later: bracket_path, fixtures[], bracket_notes
      played_matches: []
      momentum:
        label: null
        notes: null
      phase_notes: null

  # Onderlinge historie vs specifieke tegenstanders ,  HANDMATIG research
  head_to_head: []
