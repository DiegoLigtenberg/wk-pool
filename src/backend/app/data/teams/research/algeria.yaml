interpretive_ceiling_vs_floor: Eerste WK sinds 2014 onder Vladimir Petković; groep
  J met Argentinië, Oostenrijk, Jordanië. Plafond via Mahrez (Al-Ahli), Gouiri (Marseille),
  Ait-Nouri (Man City); vloer vs Messi-Argentinië,  AFCON 2025 kwartfinale.
phase_preferences:
- Sterk als Mahrez/Gouiri tussen linies ruimte vinden en Bensebaini/Mandi structuur
  houden.
- Zwakker als Argentinië bal rustig circuleert zonder Algerije uit positie te lokken.
transition_orientation_summary: 'Petković: compact mid-block, verticale uitbraken
  via Gouiri,  counters na gewonnen duel.'
psychology_intro: 12 jaar wachten; openingswedstrijd 16 juni vs titelverdediger Argentinië.
psychology_vectors:
- Punt vs Jordanië/Oostenrijk cruciaal na Argentinië.
- Mahrez’ laatste grote WK-narratief.
matchup_counters_us:
